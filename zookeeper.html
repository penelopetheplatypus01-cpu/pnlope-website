<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Penelope</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=IM+Fell+English&family=Great+Vibes&display=swap');

body {
  margin: 0;
  padding: 4rem 1rem;
  background: radial-gradient(circle at center, #caa46a 0%, #8b5e34 100%);
  font-family: 'IM Fell English', serif;
  color: #2b1a0d;
  overflow-x: hidden;
  animation: fadeIn 1.8s ease forwards;
}

/* Fade in like unfolding letter */
@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.97); }
  to { opacity: 1; transform: scale(1); }
}

/* Burned corners */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at top left, rgba(0,0,0,0.45), transparent 40%),
    radial-gradient(circle at top right, rgba(0,0,0,0.45), transparent 40%),
    radial-gradient(circle at bottom left, rgba(0,0,0,0.45), transparent 40%),
    radial-gradient(circle at bottom right, rgba(0,0,0,0.45), transparent 40%);
  pointer-events: none;
}

/* Letter container */
.letter-container {
  position: relative;
  max-width: 750px;
  margin: 0 auto;
  background: linear-gradient(180deg, #fdf1c9, #efd79b);
  padding: 4rem 3rem 6rem 3rem;
  border-radius: 6px;
  box-shadow:
    0 0 60px rgba(0,0,0,0.5),
    inset 0 0 120px rgba(0,0,0,0.15);
  border: 2px solid rgba(92,58,30,0.4);
}

/* Paper grain */
.letter-container::before {
  content: "";
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(
      45deg,
      rgba(0,0,0,0.02) 0px,
      rgba(0,0,0,0.02) 2px,
      transparent 2px,
      transparent 6px
    );
  pointer-events: none;
}

/* Page fold corner */
.letter-container::after {
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #e6c98f 50%, #d8b374 50%);
  box-shadow: -4px 4px 10px rgba(0,0,0,0.3);
  clip-path: polygon(100% 0, 0 0, 100% 100%);
}

/* Title */
h1 {
  font-family: 'UnifrakturCook', cursive;
  font-size: 2.5rem;
  text-align: center;
  margin-bottom: 2.5rem;
  letter-spacing: 2px;
  text-shadow:
    2px 2px 0 rgba(0,0,0,0.3),
    0 0 4px rgba(60,30,10,0.3);
}

/* Body text */
.letter {
  font-size: 1.25rem;
  line-height: 2;
  text-align: left;
  text-shadow:
    0 0 1px rgba(60,30,10,0.25),
    0 0 3px rgba(60,30,10,0.15);
}

/* Signature */
.signature {
  margin-top: 3rem;
  font-family: 'Great Vibes', cursive;
  font-size: 2rem;
  text-align: right;
  opacity: 0.9;
}

/* Back button */
a {
  display: inline-block;
  margin-top: 3rem;
  padding: 0.8rem 1.6rem;
  background: transparent;
  color: none;
  text-decoration: none;
  border-radius: none;
  font-weight: bold;
  box-shadow: 0 0px 0px rgba(0,0,0,0);
  transition: all 0.3s ease;
}

a:hover {
  background: transparent;
  transform: translateY(-2px);
}

.no-underline {
  color: inherit;
  text-decoration: none;
}

</style>
</head>

<body>

<div class="letter-container">

<h1>Message</h1>

<div class="acrostic">
  <p class="letter">"My fellow traders...<br>
  We are not here for logic.<br>

  When others see risk, we see opportunity.<br>
  When others sell, we hold.<br>
  When others panic, we buy again.<br><br>
  Together, we are PNLope."
  </p>
</div>

<div class="signature">
  — <a href="https://x.com/cthulhujinn" target="_blank" class="no-underline">Creator</a>
</div>

<a href="index.html">← Back</a>

</div>

</body>
</html>
